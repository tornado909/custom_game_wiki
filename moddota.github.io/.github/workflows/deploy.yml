name: Deploy

on:
  push:
    branches: source
  workflow_dispatch:   # <-- добавлен ручной триггер
  repository_dispatch:  # <-- триггер от внешнего репозитория
    types: [dota-data-updated]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
      - name: Checkout dota-data
        uses: actions/checkout@v4
        with:
          repository: iwasinminedream/dota-data
          path: dota-data
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
        name: Install dependencies
      - run: npm run build
        name: Build
      - run: touch dist/.nojekyll
        name: Create .nojekyll file
      - name: Create gh-pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
