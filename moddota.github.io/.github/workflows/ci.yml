name: CI

on: [push, pull_request]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Checkout dota-data
        uses: actions/checkout@v4
        with:
          repository: iwasinminedream/dota-data
          path: dota-data
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
      - run: npm run build
      - run: npm run lint

      - uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist
